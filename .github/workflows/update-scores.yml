name: Update Scores

on:
  schedule:
    # Every 5 minutes (GitHub's minimum). ESPN cross-check runs in parallel
    # so results arrive on-site within ~5 min of a match ending.
    - cron: '*/5 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Fetch scores and update data
        env:
          SCORES_API_KEY: ${{ secrets.SCORES_API_KEY }}
        run: node scripts/fetch-scores.mjs

      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data.json index.html
          if git diff --staged --quiet; then
            echo "No changes to commit."
          else
            git commit -m "chore: update World Cup scores $(date -u +'%Y-%m-%dT%H:%M:%SZ')"
            git push
          fi
